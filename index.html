<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnupamSteno - Legal Typing Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div id="home-page" class="full-screen-home">
        <div class="login-card">
            <div class="login-left">
                <img src="pitman.jpg" alt="Sir Isaac Pitman">
                <p>Sir Isaac Pitman</p>
            </div>
            <div class="login-right">
                <h1 class="brand">ANUPAM<span>STENO</span></h1>
                <h3>Student Login</h3>
                <p>Sign in to access typing tests and save progress.</p>
                <button onclick="handleGoogleLogin()" class="google-btn">
                    <svg width="20px" height="20px" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
                    Sign in with Google
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard-page" class="full-screen-dashboard" style="display: none;">
        <nav class="navbar">
            <div class="brand">ANUPAM<span>STENO</span></div>
            <button onclick="location.reload()" class="btn-action exit-btn">Logout</button>
        </nav>
        <div class="dashboard-layout">
            <div class="dash-left">
                <div class="format-label">Format Typing</div>
                <button onclick="toggleTestList()" class="test-trigger-btn">Test</button>
                <div id="inline-test-list" class="test-boxes-container" style="display: none;"></div>
            </div>
            <div class="dash-right">
                <button class="dash-icon-btn">Dashboard <i class="material-icons">show_chart</i></button>
            </div>
        </div>
    </div>

    <div id="workspace-page" class="app-container" style="display: none;">
        <nav class="navbar">
            <div class="brand">ANUPAM<span>STENO</span></div>
            <div class="nav-actions-group">
                <button id="start-test-btn" class="btn-action" style="background:#10b981; color:white;">Start Test</button>
                <div class="timer-display"><i class="material-icons">timer</i> <span id="timer">15:00</span></div>
                <button id="submit-btn" class="btn-action compare">Compare & Save</button>
                <button onclick="backToDashboard()" class="btn-action exit-btn">Exit</button>
            </div>
        </nav>
        <main class="workspace">
            <section class="pane pdf-pane"><div id="pdf-container" class="scroll-v"></div></section>
            <section class="pane editor-pane">
                <div class="editor-header">
                    <div class="toolbar-pill">
                        <button class="t-btn" data-cmd="bold"><i class="material-icons">format_bold</i></button>
                        <button class="t-btn" data-cmd="italic"><i class="material-icons">format_italic</i></button>
                        <button class="t-btn" data-cmd="underline"><i class="material-icons">format_underlined</i></button>
                        <div class="sep"></div>
                        <button class="t-btn" onclick="changeFontSize('inc')"><i class="material-icons">text_increase</i></button>
                        <button class="t-btn" onclick="changeFontSize('dec')"><i class="material-icons">text_decrease</i></button>
                        <div class="sep"></div>
                        <button class="t-btn" data-cmd="justifyLeft"><i class="material-icons">format_align_left</i></button>
                        <button class="t-btn" data-cmd="justifyCenter"><i class="material-icons">format_align_center</i></button>
                        <button class="t-btn" data-cmd="justifyRight"><i class="material-icons">format_align_right</i></button>
                        <button class="t-btn" data-cmd="justifyFull"><i class="material-icons">format_align_justify</i></button>
                        <div class="sep"></div>
                        <button class="t-btn" data-cmd="insertHorizontalRule"><i class="material-icons">horizontal_rule</i></button>
                    </div>
                </div>
                <div id="editor" contenteditable="false" spellcheck="false" class="typing-area"></div>
            </section>
        </main>
    </div>

    <div id="result-modal" class="modal-blur" style="display: none;">
        <div class="modal-box">
            <h2>Result with Correction</h2>
            <div class="stats-row">
                <div class="card-stat"><span class="val" id="res-wpm">0</span><span class="lbl">WPM</span></div>
                <div class="card-stat"><span class="val" id="res-acc">0%</span><span class="lbl">Accuracy</span></div>
            </div>
            <div id="error-analysis" class="analysis-text"></div>
            <button onclick="backToDashboard()" class="btn-action compare">Back to Dashboard</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
